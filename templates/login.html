<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - EmbyPulse</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eef2ff', 100: '#e0e7ff', 200: '#c7d2fe', 300: '#a5b4fc', 400: '#818cf8', 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca', 800: '#3730a3', 900: '#312e81' },
                    },
                    fontFamily: { sans: ['Noto Sans SC', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap');
        body { background-color: #000; transition: background-color 0.5s ease; }
        
        .bg-poster {
            position: fixed; inset: 0; z-index: -2;
            background-size: cover; background-position: center;
            transition: opacity 1.5s ease-in-out, transform 10s linear;
            opacity: 0; transform: scale(1.05);
        }
        .bg-poster.loaded { opacity: 1; transform: scale(1); }

        /* 去除白色遮罩，仅保留 15% 的暗角防强光刺眼 */
        .bg-dimmer {
            position: fixed; inset: 0; z-index: -1;
            background: rgba(0, 0, 0, 0.15);
            pointer-events: none;
        }

        /* 极致的毛玻璃卡片（重点强化模糊和饱和度） */
        .apple-glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        html.dark .apple-glass {
            background: rgba(25, 25, 28, 0.65);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        /* 登录失败震动特效 */
        .shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }

        /* 修复浏览器自动填充导致的背景色变白（利用超长动画时间欺骗浏览器保留透明背景） */
        input:-webkit-autofill, input:-webkit-autofill:hover, input:-webkit-autofill:focus, input:-webkit-autofill:active {
            transition: background-color 5000s ease-in-out 0s;
            -webkit-text-fill-color: #111 !important;
        }
        html.dark input:-webkit-autofill, html.dark input:-webkit-autofill:hover, html.dark input:-webkit-autofill:focus, html.dark input:-webkit-autofill:active {
            transition: background-color 5000s ease-in-out 0s;
            -webkit-text-fill-color: #fff !important;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen selection:bg-brand-500 selection:text-white">

    <button onclick="toggleTheme()" class="absolute top-5 right-5 md:top-8 md:right-8 w-11 h-11 rounded-full flex items-center justify-center z-50 bg-white/40 dark:bg-black/40 backdrop-blur-xl border border-white/40 dark:border-white/10 text-gray-800 dark:text-gray-200 hover:scale-105 active:scale-95 transition-all shadow-md">
        <i id="theme-icon" class="fa-solid fa-moon text-lg"></i>
    </button>

    <div id="bg-img" class="bg-poster"></div>
    <div class="bg-dimmer"></div>

    <div class="apple-glass w-full max-w-[420px] mx-5 p-8 md:p-10 rounded-[32px] z-10" id="login-card">
        
        <div class="text-center mb-10">
            <img src="/static/img/logo-app.png" alt="EmbyPulse Logo" class="w-[76px] h-[76px] object-cover mx-auto mb-4 rounded-[22px] shadow-lg border border-white/60 dark:border-white/10 bg-white dark:bg-[#1C1C1E]">
            <h1 class="text-[28px] font-black tracking-tight text-gray-900 dark:text-white mb-1.5">EmbyPulse</h1>
            <p class="text-[13px] text-gray-600 dark:text-gray-300 font-bold tracking-widest">您的专属私域流媒体数据管家</p>
        </div>

        <form id="login-form" class="space-y-5" onsubmit="handleLogin(event)">
            
            <div>
                <label class="block text-[11px] font-bold text-gray-600 dark:text-gray-400 mb-2 pl-1 uppercase tracking-wider">系统账号</label>
                <div class="flex items-center bg-white/70 dark:bg-black/30 border border-gray-200 dark:border-white/10 rounded-[16px] focus-within:ring-2 focus-within:ring-brand-500/50 focus-within:border-brand-500 focus-within:bg-white dark:focus-within:bg-black/50 transition-all shadow-sm group overflow-hidden">
                    <div class="pl-4 pr-2 text-gray-400 group-focus-within:text-brand-500 transition-colors flex items-center justify-center">
                        <i class="fa-solid fa-user text-[14px]"></i>
                    </div>
                    <input type="text" id="username" required autocomplete="username"
                        class="flex-1 bg-transparent border-none py-3.5 pr-4 text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-0 text-[14px] font-medium"
                        placeholder="请输入 Emby 管理员账号">
                </div>
            </div>

            <div>
                <label class="block text-[11px] font-bold text-gray-600 dark:text-gray-400 mb-2 pl-1 uppercase tracking-wider">身份凭证</label>
                <div class="flex items-center bg-white/70 dark:bg-black/30 border border-gray-200 dark:border-white/10 rounded-[16px] focus-within:ring-2 focus-within:ring-brand-500/50 focus-within:border-brand-500 focus-within:bg-white dark:focus-within:bg-black/50 transition-all shadow-sm group overflow-hidden">
                    <div class="pl-4 pr-2 text-gray-400 group-focus-within:text-brand-500 transition-colors flex items-center justify-center">
                        <i class="fa-solid fa-lock text-[14px]"></i>
                    </div>
                    <input type="password" id="password" autocomplete="current-password"
                        class="flex-1 bg-transparent border-none py-3.5 pr-4 text-gray-900 dark:text-white placeholder-gray-500 focus:outline-none focus:ring-0 text-[14px] font-medium"
                        placeholder="请输入密码 (如未设置请留空)">
                </div>
            </div>

            <button type="submit" id="submit-btn"
                class="w-full bg-brand-600 hover:bg-brand-500 text-white font-bold py-3.5 rounded-[16px] shadow-[0_8px_20px_rgba(79,70,229,0.3)] dark:shadow-[0_8px_20px_rgba(79,70,229,0.4)] transform transition-all hover:-translate-y-0.5 active:translate-y-0 active:scale-[0.98] flex items-center justify-center gap-2 mt-6 border border-brand-500">
                <span id="btn-text" class="text-[15px] tracking-wide">登录大盘</span>
                <i id="btn-icon" class="fa-solid fa-arrow-right-to-bracket text-[14px] opacity-80"></i>
            </button>
        </form>
    </div>

    <div class="absolute bottom-6 text-center z-10 w-full drop-shadow-md">
        <p class="text-[10px] text-white/70 font-mono tracking-tight" id="bg-source">Wallpaper loading...</p>
    </div>

    <script>
        // 主题初始化逻辑：默认亮色模式
        function initTheme() {
            const icon = document.getElementById('theme-icon');
            if (localStorage.theme === 'dark') {
                document.documentElement.classList.add('dark');
                icon.className = 'fa-solid fa-sun text-lg';
            } else {
                document.documentElement.classList.remove('dark');
                icon.className = 'fa-solid fa-moon text-lg';
            }
        }

        // 手动切换主题
        function toggleTheme() {
            const html = document.documentElement;
            const icon = document.getElementById('theme-icon');
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                localStorage.theme = 'light';
                icon.className = 'fa-solid fa-moon text-lg';
            } else {
                html.classList.add('dark');
                localStorage.theme = 'dark';
                icon.className = 'fa-solid fa-sun text-lg';
            }
        }

        initTheme();

        // 获取并渲染 TMDB 高清背景
        async function loadBackground() {
            try {
                const res = await fetch('/api/wallpaper');
                const json = await res.json();
                
                if(json.status === 'success' && json.url) {
                    const img = new Image();
                    img.src = json.url;
                    img.onload = () => {
                        const el = document.getElementById('bg-img');
                        el.style.backgroundImage = `url('${json.url}')`;
                        el.classList.add('loaded'); // 触发缩放渐显动画
                        if(json.title) document.getElementById('bg-source').innerText = "Wallpaper by " + json.title;
                    };
                }
            } catch(e) { console.error("BG Error:", e); }
        }
        loadBackground();

        // 处理登录逻辑
        async function handleLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const btnText = document.getElementById('btn-text');
            const btnIcon = document.getElementById('btn-icon');
            const card = document.getElementById('login-card');
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            btnText.innerText = "验证中...";
            btnIcon.className = "fa-solid fa-circle-notch fa-spin text-[14px]";
            btn.disabled = true;
            btn.classList.add('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                const json = await res.json();

                if(json.status === 'success') {
                    btnText.innerText = "登录成功";
                    btnIcon.className = "fa-solid fa-check text-[14px]";
                    btn.classList.replace('bg-brand-600', 'bg-emerald-500');
                    btn.classList.replace('border-brand-500', 'border-emerald-400');
                    btn.classList.replace('shadow-[0_8px_20px_rgba(79,70,229,0.3)]', 'shadow-[0_8px_20px_rgba(16,185,129,0.3)]');
                    setTimeout(() => window.location.href = '/', 400);
                } else {
                    throw new Error(json.message);
                }
            } catch (err) {
                btnText.innerText = "登录大盘";
                btnIcon.className = "fa-solid fa-arrow-right-to-bracket text-[14px] opacity-80";
                btn.disabled = false;
                btn.classList.remove('opacity-80', 'cursor-not-allowed', 'scale-[0.98]');
                
                card.classList.add('shake');
                setTimeout(() => card.classList.remove('shake'), 500);
                
                const toast = document.createElement('div');
                toast.className = 'fixed top-10 left-1/2 transform -translate-x-1/2 bg-white/90 dark:bg-[#2C2C2E]/90 backdrop-blur-xl text-red-500 border border-red-200 dark:border-red-500/20 px-6 py-3.5 rounded-full shadow-2xl z-50 text-[13px] font-bold flex items-center animate-bounce';
                toast.innerHTML = `<i class="fa-solid fa-triangle-exclamation mr-2.5 text-lg"></i> ${err.message}`;
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }
        }
    </script>
</body>
</html>
