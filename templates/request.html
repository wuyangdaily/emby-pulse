<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心愿单 | 资源求片系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 丝滑的过渡动画 */
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 0.4s ease; }
        .glass-panel { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        body { background-color: #f3f4f6; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 20px 20px; }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <header class="glass-panel sticky top-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="font-bold text-xl tracking-wider text-indigo-600">
                <i class="fa-solid fa-clapperboard mr-2"></i> EmbyPulse 心愿单
            </div>
            <div id="nav-user-info" class="hidden text-sm font-medium text-gray-500">
                <span id="current-username" class="mr-4 text-gray-700"></span>
                <button onclick="logout()" class="hover:text-red-500 transition"><i class="fa-solid fa-right-from-bracket"></i> 退出</button>
            </div>
        </div>
    </header>

    <main class="flex-grow w-full max-w-5xl mx-auto p-4 sm:p-6 flex flex-col items-center justify-center relative">
        
        <div id="login-section" class="w-full max-w-md glass-panel rounded-2xl p-8 shadow-xl fade-enter-active hidden">
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold text-gray-800 mb-2">专属通道验证</h2>
                <p class="text-sm text-gray-500">请输入您的 Emby 账号与密码以继续</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Emby 账号</label>
                    <input type="text" id="username" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="Username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">密码</label>
                    <input type="password" id="password" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition" placeholder="••••••••">
                </div>
                <button onclick="doLogin()" id="login-btn" class="w-full mt-6 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2.5 rounded-lg shadow-md transition duration-200 flex justify-center items-center">
                    <span>登录并进入</span>
                </button>
                <p id="login-error" class="text-red-500 text-sm text-center hidden mt-2"></p>
            </div>
        </div>

        <div id="main-section" class="w-full hidden fade-enter h-full flex flex-col">
            <div class="flex space-x-4 mb-6 border-b border-gray-200">
                <button onclick="switchTab('search')" id="tab-search" class="pb-2 border-b-2 border-indigo-600 text-indigo-600 font-medium px-2 transition">🔍 探索求片</button>
                <button onclick="switchTab('my')" id="tab-my" class="pb-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-medium px-2 transition">📋 我的心愿</button>
            </div>

            <div id="panel-search" class="w-full">
                <div class="relative max-w-2xl mx-auto mb-8">
                    <input type="text" id="search-input" onkeypress="if(event.key === 'Enter') doSearch()" class="w-full pl-12 pr-4 py-3 rounded-xl border border-gray-300 shadow-sm focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none text-lg transition" placeholder="输入你想看的电影或剧集名称...">
                    <i class="fa-solid fa-magnifying-glass absolute left-4 top-3.5 text-gray-400 text-xl"></i>
                    <button onclick="doSearch()" class="absolute right-2 top-2 bg-indigo-600 text-white px-4 py-1.5 rounded-lg hover:bg-indigo-700 transition">搜索</button>
                </div>
                
                <div id="search-loading" class="hidden text-center text-gray-500 my-10"><i class="fa-solid fa-spinner fa-spin text-3xl"></i><p class="mt-2">正在连接 TMDB 浩瀚宇宙...</p></div>
                <div id="search-results" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-4 sm:gap-6"></div>
            </div>

            <div id="panel-my" class="w-full hidden">
                <div id="my-loading" class="hidden text-center text-gray-500 my-10"><i class="fa-solid fa-spinner fa-spin text-3xl"></i></div>
                <div id="my-results" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 transform translate-y-20 opacity-0 transition-all duration-300 px-6 py-3 rounded-lg shadow-lg text-white font-medium z-50"></div>

    <script>
        // 初始化状态注入 (由后端 Jinja2 引擎注入)
        const isLogged = {{ 'true' if req_user else 'false' }};
        const currentUserName = "{{ req_user.Name if req_user else '' }}";

        // 页面加载逻辑
        window.onload = () => {
            if (isLogged) {
                document.getElementById('nav-user-info').classList.remove('hidden');
                document.getElementById('current-username').innerText = '👋 ' + currentUserName;
                showSection('main-section');
                loadMyRequests(); // 预加载我的请求
            } else {
                showSection('login-section');
            }
        };

        // UI 切换帮助函数
        function showSection(id) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.add('hidden');
            const target = document.getElementById(id);
            target.classList.remove('hidden');
            setTimeout(() => target.classList.add('fade-enter-active'), 10);
        }

        function switchTab(tab) {
            document.getElementById('tab-search').className = "pb-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-medium px-2 transition";
            document.getElementById('tab-my').className = "pb-2 border-b-2 border-transparent text-gray-500 hover:text-gray-700 font-medium px-2 transition";
            document.getElementById('panel-search').classList.add('hidden');
            document.getElementById('panel-my').classList.add('hidden');

            if (tab === 'search') {
                document.getElementById('tab-search').className = "pb-2 border-b-2 border-indigo-600 text-indigo-600 font-medium px-2 transition";
                document.getElementById('panel-search').classList.remove('hidden');
            } else {
                document.getElementById('tab-my').className = "pb-2 border-b-2 border-indigo-600 text-indigo-600 font-medium px-2 transition";
                document.getElementById('panel-my').classList.remove('hidden');
                loadMyRequests();
            }
        }

        function showToast(msg, type='success') {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.className = `fixed bottom-5 right-5 px-6 py-3 rounded-lg shadow-lg text-white font-medium z-50 transition-all duration-300 transform translate-y-0 opacity-100 ${type === 'error' ? 'bg-red-500' : 'bg-green-500'}`;
            setTimeout(() => { toast.classList.remove('translate-y-0', 'opacity-100'); toast.classList.add('translate-y-20', 'opacity-0'); }, 3000);
        }

        // ================= 业务逻辑 =================

        async function doLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const err = document.getElementById('login-error');
            
            if (!u || !p) { err.innerText = "账号密码不能为空"; err.classList.remove('hidden'); return; }
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            err.classList.add('hidden');

            try {
                const res = await fetch('/api/requests/auth', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: u, password: p })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    window.location.reload(); // 刷新以获取 session
                } else {
                    err.innerText = data.message; err.classList.remove('hidden');
                }
            } catch (e) { err.innerText = "网络错误"; err.classList.remove('hidden'); }
            btn.innerHTML = '<span>登录并进入</span>';
        }

        async function doSearch() {
            const query = document.getElementById('search-input').value;
            if (!query) return;
            
            document.getElementById('search-results').innerHTML = '';
            document.getElementById('search-loading').classList.remove('hidden');

            try {
                const res = await fetch(`/api/requests/search?query=${encodeURIComponent(query)}`);
                const data = await res.json();
                document.getElementById('search-loading').classList.add('hidden');
                
                if (data.status === 'success' && data.data.length > 0) {
                    let html = '';
                    data.data.forEach(item => {
                        const defaultPoster = 'https://via.placeholder.com/500x750.png?text=No+Poster';
                        const typeIcon = item.media_type === 'movie' ? '🎬' : '📺';
                        
                        // 🔥 动态生成按钮
                        let btnHtml = '';
                        if (item.local_status === -1) {
                            btnHtml = `<button onclick="submitRequest(${item.tmdb_id}, '${item.media_type}', '${item.title.replace(/'/g, "\\'")}', '${item.year}', '${item.poster_path}')" class="bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-2 px-6 rounded-full transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 shadow-lg"><i class="fa-solid fa-plus mr-1"></i> 申请求片</button>`;
                        } else if (item.local_status === 0 || item.local_status === 1) {
                            btnHtml = `<button onclick="submitRequest(${item.tmdb_id}, '${item.media_type}', '${item.title.replace(/'/g, "\\'")}', '${item.year}', '${item.poster_path}')" class="bg-yellow-500 hover:bg-yellow-400 text-white font-bold py-2 px-6 rounded-full transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 shadow-lg"><i class="fa-solid fa-thumbs-up mr-1"></i> 我也想看 (+1)</button>`;
                        } else if (item.local_status === 2) {
                            btnHtml = `<button disabled class="bg-green-500 text-white font-bold py-2 px-6 rounded-full transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 shadow-lg cursor-not-allowed"><i class="fa-solid fa-check mr-1"></i> 已在媒体库</button>`;
                        } else {
                            btnHtml = `<button disabled class="bg-gray-500 text-white font-bold py-2 px-6 rounded-full transform translate-y-4 group-hover:translate-y-0 transition-all duration-300 shadow-lg cursor-not-allowed"><i class="fa-solid fa-ban mr-1"></i> 暂不收录</button>`;
                        }

                        html += `
                        <div class="bg-white rounded-xl shadow-sm hover:shadow-xl transition-shadow duration-300 overflow-hidden group flex flex-col">
                            <div class="relative w-full aspect-[2/3] overflow-hidden bg-gray-100">
                                <img src="${item.poster_path || defaultPoster}" class="object-cover w-full h-full group-hover:scale-105 transition-transform duration-500" loading="lazy">
                                <div class="absolute inset-0 bg-black bg-opacity-0 group-hover:bg-opacity-60 transition-all duration-300 flex items-center justify-center opacity-0 group-hover:opacity-100">
                                    ${btnHtml}
                                </div>
                            </div>
                            <div class="p-3 flex-grow flex flex-col justify-between">
                                <h3 class="font-bold text-gray-800 leading-tight line-clamp-2" title="${item.title}">${item.title}</h3>
                                <div class="text-xs text-gray-500 mt-2 flex justify-between">
                                    <span>${typeIcon} ${item.media_type === 'movie'?'电影':'剧集'}</span>
                                    <span>${item.year}</span>
                                </div>
                            </div>
                        </div>`;
                    });
                    document.getElementById('search-results').innerHTML = html;
                } else {
                    document.getElementById('search-results').innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">未找到相关资源，换个关键词试试？</div>`;
                }
            } catch (e) {
                document.getElementById('search-loading').classList.add('hidden');
                showToast("搜索出错，请检查服主是否配置了 TMDB Key 或代理", "error");
            }
        }

        async function submitRequest(id, type, title, year, poster) {
            try {
                const res = await fetch('/api/requests/submit', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tmdb_id: id, media_type: type, title: title, year: year, poster_path: poster })
                });
                const data = await res.json();
                if (data.status === 'success') {
                    showToast(data.message);
                    // 提交成功后自动重新搜索以刷新按钮状态
                    doSearch();
                } else {
                    showToast(data.message, "error");
                }
            } catch (e) { showToast("提交失败，网络异常", "error"); }
        }

        async function loadMyRequests() {
            document.getElementById('my-results').innerHTML = '';
            document.getElementById('my-loading').classList.remove('hidden');
            try {
                const res = await fetch('/api/requests/my');
                const data = await res.json();
                document.getElementById('my-loading').classList.add('hidden');
                
                if (data.status === 'success' && data.data.length > 0) {
                    let html = '';
                    const statusMap = {
                        0: {text: '待审批', color: 'bg-yellow-100 text-yellow-800 border-yellow-200'},
                        1: {text: '下载中 🚀', color: 'bg-blue-100 text-blue-800 border-blue-200'},
                        2: {text: '已入库 🎉', color: 'bg-green-100 text-green-800 border-green-200'},
                        3: {text: '已拒绝', color: 'bg-red-100 text-red-800 border-red-200'}
                    };

                    data.data.forEach(item => {
                        const st = statusMap[item.status];
                        const defaultPoster = 'https://via.placeholder.com/500x750.png?text=No+Poster';
                        html += `
                        <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-4 flex gap-4 items-center">
                            <img src="${item.poster_path || defaultPoster}" class="w-16 h-24 object-cover rounded-lg shadow-sm">
                            <div class="flex-grow">
                                <h3 class="font-bold text-lg text-gray-800">${item.title} <span class="text-sm font-normal text-gray-500">(${item.year})</span></h3>
                                <p class="text-xs text-gray-400 mt-1">求片时间: ${item.requested_at.substring(0, 16)}</p>
                            </div>
                            <div class="px-3 py-1 rounded-full text-xs font-medium border ${st.color} whitespace-nowrap">
                                ${st.text}
                            </div>
                        </div>`;
                    });
                    document.getElementById('my-results').innerHTML = html;
                } else {
                    document.getElementById('my-results').innerHTML = `<div class="col-span-full text-center text-gray-500 py-10">你还没有求过片，快去探索吧！</div>`;
                }
            } catch (e) {}
        }

        async function logout() {
            // 简单的清除 Session 机制 (前端无权限直接清，此处偷懒直接清 cookie)
            document.cookie = "session=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;";
            window.location.reload();
        }
    </script>
</body>
</html>
