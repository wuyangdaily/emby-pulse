{% extends "layout.html" %}

{% block content %}
<div id="sticky-header-container" class="sticky top-0 z-50 flex flex-col w-full shadow-sm">
    
    <div class="bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl px-4 md:px-6 py-3.5 border-b border-gray-200 dark:border-gray-800 flex justify-between items-center transition-colors">
        
        <div class="flex items-center gap-3">
            <div class="hidden sm:flex w-9 h-9 rounded-xl bg-indigo-50 dark:bg-indigo-500/10 items-center justify-center text-indigo-600 dark:text-indigo-400">
                <i class="fa-solid fa-calendar-days"></i>
            </div>
            <div>
                <h1 class="text-lg md:text-xl font-black text-gray-900 dark:text-white tracking-tight flex items-center gap-2">
                    追剧排期
                    <span class="text-[10px] font-bold text-indigo-600 dark:text-indigo-400 bg-indigo-50 dark:bg-indigo-500/10 px-1.5 py-0.5 rounded border border-indigo-100 dark:border-indigo-500/20">Beta</span>
                </h1>
                <p class="hidden md:block text-xs font-medium text-gray-500 dark:text-gray-400 mt-0.5">智能联动 Emby 媒体库状态</p>
            </div>
        </div>
        
        <div class="flex items-center gap-2 md:gap-3">
            <div class="flex items-center bg-gray-50 dark:bg-gray-800/50 rounded-lg border border-gray-200 dark:border-gray-700 p-0.5">
                <button onclick="changeWeek(-1)" class="p-1.5 md:p-2 hover:bg-white dark:hover:bg-gray-700 rounded-md text-gray-500 hover:text-indigo-500 transition-all shadow-sm hover:shadow">
                    <i class="fa-solid fa-chevron-left text-xs md:text-sm"></i>
                </button>
                <div class="px-2 md:px-4 text-[10px] md:text-xs font-black text-gray-700 dark:text-gray-200 min-w-[75px] md:min-w-[100px] text-center tracking-wider" id="date-range-display">
                    ...
                </div>
                <button onclick="changeWeek(1)" class="p-1.5 md:p-2 hover:bg-white dark:hover:bg-gray-700 rounded-md text-gray-500 hover:text-indigo-500 transition-all shadow-sm hover:shadow">
                    <i class="fa-solid fa-chevron-right text-xs md:text-sm"></i>
                </button>
            </div>

            <div class="flex items-center gap-1.5">
                <div class="relative group hidden sm:block">
                    <select id="ttl-select" onchange="updateTTL(this.value)" class="appearance-none pl-3 pr-7 py-2 bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-lg text-xs font-bold text-gray-600 dark:text-gray-300 outline-none cursor-pointer hover:border-indigo-500 transition-all">
                        <option value="3600">缓存 1h</option>
                        <option value="43200">缓存 12h</option>
                        <option value="86400">缓存 1d</option>
                    </select>
                    <i class="fa-solid fa-chevron-down absolute right-2.5 top-2.5 text-[10px] text-gray-400 pointer-events-none"></i>
                </div>
                <button onclick="fetchCalendar(true)" id="refresh-btn" class="p-2 bg-gray-50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 rounded-lg text-gray-500 hover:text-indigo-500 shadow-sm hover:shadow transition-all active:scale-95">
                    <i class="fa-solid fa-arrows-rotate text-sm"></i>
                </button>
            </div>
        </div>
    </div>

    <div id="mobile-day-nav" class="md:hidden bg-white/95 dark:bg-gray-900/95 backdrop-blur-xl border-b border-gray-100 dark:border-gray-800 flex overflow-x-auto no-scrollbar shadow-sm">
        </div>

</div>

<div class="w-full max-w-[1600px] mx-auto px-3 md:px-6 py-4 pb-24">
    
    <div id="loading" class="flex flex-col items-center justify-center py-32">
        <div class="relative w-12 h-12">
            <div class="absolute inset-0 border-4 border-indigo-100 dark:border-indigo-900/30 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-indigo-600 dark:border-indigo-500 rounded-full animate-spin border-t-transparent"></div>
        </div>
        <p class="mt-4 text-[10px] font-bold text-gray-400 animate-pulse tracking-widest uppercase">正在同步排期...</p>
    </div>

    <div id="error-msg" class="hidden mx-auto max-w-lg bg-red-50 dark:bg-red-900/20 border border-red-200 dark:border-red-800/50 rounded-2xl p-6 text-center mt-10">
        <p id="error-text" class="text-red-700 dark:text-red-400 text-sm font-bold mb-4"></p>
        <button onclick="fetchCalendar(true)" class="px-5 py-2 bg-white dark:bg-red-900/50 border border-red-200 dark:border-red-700 text-red-700 dark:text-red-300 rounded-xl text-sm font-black transition-all">重试</button>
    </div>

    <div id="calendar-grid" class="hidden grid grid-cols-1 md:grid-cols-7 gap-y-6 md:gap-x-4 lg:gap-x-5 items-start">
        </div>
</div>

<div id="detail-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4">
    <div class="absolute inset-0 bg-black/70 backdrop-blur-sm" onclick="closeDetails()"></div>
    <div id="modal-container" class="relative w-[92%] sm:w-full max-w-md md:max-w-3xl overflow-hidden transition-all duration-300 ease-out bg-white dark:bg-gray-900 shadow-2xl rounded-2xl md:rounded-3xl scale-95 opacity-0">
        
        <button onclick="closeDetails()" class="absolute top-3 right-3 md:top-4 md:right-4 w-7 h-7 md:w-8 md:h-8 flex items-center justify-center rounded-full bg-gray-100 dark:bg-gray-800 text-gray-500 hover:text-indigo-500 transition-all z-20">
            <i class="fa-solid fa-xmark text-sm"></i>
        </button>
        
        <div class="flex flex-row items-start p-4 md:p-0 max-h-[85vh] overflow-y-auto custom-scroll">
            
            <div class="w-1/3 md:w-2/5 aspect-[2/3] md:aspect-auto md:h-full relative shrink-0 bg-gray-100 dark:bg-gray-800 rounded-xl md:rounded-none overflow-hidden shadow-md md:shadow-none">
                <img id="m-poster" src="" class="absolute inset-0 w-full h-full object-cover">
            </div>
            
            <div class="pl-4 md:p-8 flex-1 flex flex-col justify-start z-10 w-2/3 md:w-3/5">
                <h3 id="m-title" class="text-lg md:text-3xl font-black text-gray-900 dark:text-white leading-tight pr-6 md:pr-0 line-clamp-2 md:line-clamp-none"></h3>
                
                <div class="flex flex-wrap items-center gap-2 mt-2 md:mt-3">
                    <span id="m-episode-label" class="text-indigo-600 dark:text-indigo-400 font-mono font-bold bg-indigo-50 dark:bg-indigo-900/30 px-1.5 py-0.5 rounded border border-indigo-100 dark:border-indigo-500/30 text-[10px] md:text-sm"></span>
                    <span id="m-status-badge" class="px-1.5 py-0.5 rounded text-[9px] md:text-[10px] font-black uppercase tracking-widest text-white"></span>
                </div>
                
                <p class="text-[10px] md:text-xs text-gray-500 dark:text-gray-400 mt-3 md:mt-4 font-mono flex items-center gap-1.5">
                    <i class="fa-regular fa-clock"></i> <span id="m-date-val"></span>
                </p>
                
                <div class="mt-3 md:mt-5 text-[11px] md:text-sm text-gray-600 dark:text-gray-300 leading-relaxed overflow-y-auto custom-scroll pr-1 md:pr-2 max-h-[120px] md:max-h-[200px]">
                    <p id="m-description"></p>
                </div>
                
                <div id="m-actions" class="mt-4 md:mt-8 flex gap-2 md:gap-3"></div>
            </div>
        </div>
    </div>
</div>

<script>
let currentOffset = 0;
let currentServerId = ""; 
let currentEmbyUrl = "";
let scrollObserver = null;
const imgBase = "https://image.tmdb.org/t/p/w500";

document.addEventListener('DOMContentLoaded', () => fetchCalendar(false));

function changeWeek(offset) {
    currentOffset += offset;
    fetchCalendar(false);
}

async function updateTTL(val) {
    try {
        await fetch('/api/calendar/config', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ ttl: parseInt(val) })
        });
        fetchCalendar(true);
    } catch (e) { console.error(e); }
}

async function fetchCalendar(forceRefresh = false) {
    const loadingEl = document.getElementById('loading');
    const gridEl = document.getElementById('calendar-grid');
    const errorEl = document.getElementById('error-msg');
    
    gridEl.classList.add('hidden');
    document.getElementById('mobile-day-nav').innerHTML = ''; 
    loadingEl.classList.remove('hidden');
    errorEl.classList.add('hidden');

    try {
        const res = await fetch(`/api/calendar/weekly?refresh=${forceRefresh}&offset=${currentOffset}`);
        const data = await res.json();
        if (data.error) throw new Error(data.error);

        document.getElementById('date-range-display').textContent = 
            (currentOffset === 1 ? "下周 " : currentOffset === -1 ? "上周 " : "") + data.date_range;
        
        if (data.current_ttl) document.getElementById('ttl-select').value = data.current_ttl;

        currentServerId = data.server_id || ""; 
        currentEmbyUrl = data.emby_url || "";
        
        renderMobileNav(data.days);
        renderCalendar(data.days);
        setupScrollSpy(); 
        
        loadingEl.classList.add('hidden');
        gridEl.classList.remove('hidden');

    } catch (e) {
        loadingEl.classList.add('hidden');
        document.getElementById('error-text').textContent = e.message;
        errorEl.classList.remove('hidden');
    }
}

function renderMobileNav(days) {
    const navContainer = document.getElementById('mobile-day-nav');
    navContainer.innerHTML = days.map((day, index) => `
        <button id="nav-btn-${index}" onclick="scrollToDay(${index})" 
                class="flex-1 flex flex-col items-center justify-center py-2 px-1 min-w-[52px] border-b-[3px] border-transparent transition-all shrink-0
                ${day.is_today && currentOffset === 0 ? 'border-indigo-500 bg-indigo-50 dark:bg-indigo-900/20' : 'hover:bg-gray-50 dark:hover:bg-gray-800'}">
            <span id="nav-text-${index}" class="text-xs font-bold ${day.is_today && currentOffset === 0 ? 'text-indigo-600 dark:text-indigo-400' : 'text-gray-500 dark:text-gray-400'}">${day.weekday_cn}</span>
            <span id="nav-date-${index}" class="text-[10px] font-mono ${day.is_today && currentOffset === 0 ? 'text-indigo-500 dark:text-indigo-300' : 'text-gray-400'}">${day.date.slice(5)}</span>
        </button>
    `).join('');
}

function renderCalendar(days) {
    const container = document.getElementById('calendar-grid');
    
    container.innerHTML = days.map((day, index) => {
        const isToday = day.is_today && currentOffset === 0;
        
        const itemsHtml = day.items.length === 0 
            ? `<div class="py-8 text-center bg-gray-50 dark:bg-gray-800/30 rounded-2xl border border-dashed border-gray-200 dark:border-gray-700">
                   <p class="text-xs text-gray-400 font-bold tracking-widest">今日无排期</p>
               </div>`
            : day.items.map(item => generateCardHtml(item)).join('');

        return `
            <div id="day-section-${index}" class="day-section flex flex-col gap-3 md:gap-4 relative">
                
                <div class="hidden md:flex justify-between items-end pb-2 pt-3 mb-1 border-b-2 ${isToday ? 'border-indigo-500' : 'border-gray-100 dark:border-gray-800'} sticky top-[72px] z-30 bg-white/95 dark:bg-gray-900/95 backdrop-blur-md">
                    <span class="font-black text-base ${isToday ? 'text-indigo-600 dark:text-indigo-400' : 'text-gray-800 dark:text-gray-200'}">${day.weekday_cn}</span>
                    <span class="text-[10px] font-mono font-bold text-gray-400">${day.date.slice(5)}</span>
                </div>
                
                <div class="md:hidden flex items-center gap-3 pt-4 pb-1 sticky top-[108px] z-30 bg-white/95 dark:bg-gray-950/95 backdrop-blur-md">
                    <span class="font-black text-lg ${isToday ? 'text-indigo-600 dark:text-indigo-400' : 'text-gray-800 dark:text-white'}">${day.weekday_cn}</span>
                    <span class="text-xs font-mono font-bold text-gray-400">${day.date.slice(5)}</span>
                    ${isToday ? '<span class="px-2 py-0.5 bg-indigo-100 dark:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 rounded text-[10px] font-bold">今天</span>' : ''}
                    <div class="flex-1 h-px bg-gray-200 dark:bg-gray-800"></div>
                </div>

                ${itemsHtml}
            </div>
        `;
    }).join('');
}

function generateCardHtml(item) {
    const statusMap = {
        'ready': { color: 'bg-green-100 text-green-700', text: '已入库', dot: 'bg-green-500' },
        'missing': { color: 'bg-red-100 text-red-700', text: '待补货', dot: 'bg-red-500 animate-pulse' },
        'today': { color: 'bg-red-100 text-red-700', text: '今日更新', dot: 'bg-red-500 animate-pulse' },
        'upcoming': { color: 'bg-blue-100 text-blue-700', text: '待播出', dot: 'bg-blue-500' }
    };
    const s = statusMap[item.status] || { color: 'bg-gray-100 text-gray-700', text: '未知', dot: 'bg-gray-500' };
    const poster = item.poster_path ? (imgBase + item.poster_path) : 'https://via.placeholder.com/300x450?text=No+Poster';
    const desc = item.series_overview || item.overview || "暂无剧情简介，静待更新...";
    
    const formattedAirDate = item.air_date ? item.air_date.replace(/-/g, '.') : '未知时间';

    return `
    <div onclick='showDetails(${JSON.stringify(item).replace(/'/g, "&apos;")})' 
         class="group flex flex-row md:flex-col bg-white dark:bg-gray-800 rounded-2xl overflow-hidden shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 dark:border-gray-700/60 cursor-pointer hover:-translate-y-1">
        
        <div class="relative w-28 sm:w-36 md:w-full shrink-0 aspect-[2/3] bg-gray-100 dark:bg-gray-900 overflow-hidden border-r md:border-r-0 md:border-b border-gray-100 dark:border-gray-700/50">
            <img src="${poster}" class="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" loading="lazy">
        </div>

        <div class="p-3 sm:p-4 flex-1 flex flex-col justify-start min-w-0">
            <div class="flex justify-between items-start gap-2 mb-1">
                <h3 class="text-sm md:text-base font-black text-gray-900 dark:text-white leading-tight line-clamp-2 md:line-clamp-1 break-all">${item.series_name}</h3>
                <span class="shrink-0 text-[10px] font-mono font-bold text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-gray-700/50 px-1.5 py-0.5 rounded">
                    S${String(item.season).padStart(2,'0')}E${String(item.episode).padStart(2,'0')}
                </span>
            </div>

            <div class="flex items-center gap-1.5 mt-1 md:mt-2">
                <span class="w-1.5 h-1.5 rounded-full ${s.dot}"></span>
                <span class="text-[10px] md:text-xs font-bold text-gray-500 dark:text-gray-400 shrink-0">${s.text}</span>
                <span class="text-gray-300 dark:text-gray-600 text-[10px] mx-0.5">|</span>
                <span class="text-[10px] md:text-xs font-mono text-gray-500 dark:text-gray-400 truncate">${formattedAirDate}</span>
            </div>

            <p class="text-[11px] md:text-xs text-gray-500 dark:text-gray-400 mt-2 md:mt-3 line-clamp-2 leading-relaxed">
                ${desc}
            </p>
        </div>
    </div>
    `;
}

function setupScrollSpy() {
    if (scrollObserver) scrollObserver.disconnect();
    if (window.innerWidth >= 768) return; 

    const sections = document.querySelectorAll('.day-section');
    scrollObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const dayIndex = entry.target.id.split('-')[2];
                highlightNavBtn(dayIndex);
            }
        });
    }, { 
        rootMargin: '-150px 0px -50% 0px' 
    });

    sections.forEach(sec => scrollObserver.observe(sec));
}

function highlightNavBtn(activeIndex) {
    document.querySelectorAll('[id^="nav-btn-"]').forEach(btn => {
        btn.classList.remove('border-indigo-500', 'bg-indigo-50', 'dark:bg-indigo-900/20');
        btn.classList.add('border-transparent');
    });
    document.querySelectorAll('[id^="nav-text-"]').forEach(txt => {
        txt.classList.remove('text-indigo-600', 'dark:text-indigo-400');
        txt.classList.add('text-gray-500', 'dark:text-gray-400');
    });
    document.querySelectorAll('[id^="nav-date-"]').forEach(date => {
        date.classList.remove('text-indigo-500', 'dark:text-indigo-300');
        date.classList.add('text-gray-400');
    });

    const activeBtn = document.getElementById(`nav-btn-${activeIndex}`);
    const activeTxt = document.getElementById(`nav-text-${activeIndex}`);
    const activeDate = document.getElementById(`nav-date-${activeIndex}`);
    
    if (activeBtn) {
        activeBtn.classList.remove('border-transparent');
        activeBtn.classList.add('border-indigo-500', 'bg-indigo-50', 'dark:bg-indigo-900/20');
        activeTxt.classList.remove('text-gray-500', 'dark:text-gray-400');
        activeTxt.classList.add('text-indigo-600', 'dark:text-indigo-400');
        activeDate.classList.remove('text-gray-400');
        activeDate.classList.add('text-indigo-500', 'dark:text-indigo-300');
        
        activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
    }
}

// 🔥 核心修复 1: 使用原生 getBoundingClientRect 绝对计算距离，彻底解决移动端滑动失效问题
function scrollToDay(index) {
    const section = document.getElementById(`day-section-${index}`);
    const headerContainer = document.getElementById('sticky-header-container');
    
    if (section && headerContainer) {
        // 计算绝对位置：元素距离顶部的相对距离 + 当前页面滚动高度 - 顶部吸顶导航的高度 - 额外预留15px呼吸空间
        const offsetPosition = section.getBoundingClientRect().top + window.scrollY - headerContainer.offsetHeight - 15;
        
        window.scrollTo({
            top: offsetPosition,
            behavior: "smooth"
        });
        
        if(window.innerWidth < 768) { 
            highlightNavBtn(index); 
        }
    }
}

function showDetails(item) {
    const modal = document.getElementById('detail-modal');
    const container = document.getElementById('modal-container');
    
    document.getElementById('m-title').textContent = item.series_name;
    document.getElementById('m-episode-label').textContent = `S${String(item.season).padStart(2,'0')}E${String(item.episode).padStart(2,'0')}`;
    document.getElementById('m-poster').src = item.poster_path ? (imgBase + item.poster_path) : '';
    
    const formattedAirDate = item.air_date ? item.air_date.replace(/-/g, '.') : '未知时间';
    document.getElementById('m-date-val').textContent = formattedAirDate;
    document.getElementById('m-description').textContent = item.series_overview || item.overview || "静待更新...";

    const badge = document.getElementById('m-status-badge');
    const actions = document.getElementById('m-actions');
    actions.innerHTML = '';
    
    const isReady = item.status === 'ready';
    badge.textContent = isReady ? "已入库" : item.status === 'upcoming' ? "待播出" : "待补货";
    badge.className = `px-1.5 py-0.5 rounded text-[9px] md:text-[10px] font-black uppercase tracking-widest text-white ${isReady ? "bg-green-500" : item.status === 'upcoming' ? "bg-blue-500" : "bg-red-500"}`;

    if (isReady) {
        actions.innerHTML = `
            <button onclick="playItem('${item.series_id}')" class="flex-1 py-2.5 md:py-3 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg md:rounded-xl text-xs md:text-sm font-black shadow-lg shadow-indigo-500/30 active:scale-95 transition-all flex justify-center gap-2">
                <i class="fa-solid fa-play mt-0.5"></i> 立即播放
            </button>`;
    } else {
        const copyTxt = `${item.series_name} S${String(item.season).padStart(2,'0')}E${String(item.episode).padStart(2,'0')}`;
        actions.innerHTML = `
            <button onclick="copyToClipboard('${copyTxt}')" class="flex-1 py-2.5 md:py-3 bg-gray-800 dark:bg-gray-700 text-white rounded-lg md:rounded-xl text-xs md:text-sm font-black active:scale-95 transition-all flex justify-center gap-2">
                <i class="fa-solid fa-copy mt-0.5"></i> 复制排期
            </button>`;
    }

    modal.classList.remove('hidden');
    container.offsetHeight; 
    container.classList.remove('scale-95', 'opacity-0');
    container.classList.add('scale-100', 'opacity-100');
}

function closeDetails() {
    const modal = document.getElementById('detail-modal');
    const container = document.getElementById('modal-container');
    container.classList.remove('scale-100', 'opacity-100');
    container.classList.add('scale-95', 'opacity-0');
    setTimeout(() => modal.classList.add('hidden'), 300);
}

function playItem(id) {
    window.open(`${currentEmbyUrl}/web/index.html#!/item?id=${id}&serverId=${currentServerId}`, '_blank');
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text).then(() => {
        const btn = document.querySelector('#m-actions button');
        const ogHtml = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-check mt-0.5"></i> 已复制';
        setTimeout(() => { btn.innerHTML = ogHtml; closeDetails(); }, 1000);
    });
}
</script>

<style>
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .custom-scroll::-webkit-scrollbar { width: 4px; }
    .custom-scroll::-webkit-scrollbar-track { background: transparent; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    .dark .custom-scroll::-webkit-scrollbar-thumb { background: #475569; }
</style>
{% endblock %}
