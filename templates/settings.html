{% extends "layout.html" %}

{% block content %}
<div class="w-full max-w-[1600px] mx-auto px-4 md:px-6 py-6 pb-20">
    
    <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-black text-gray-900 dark:text-white tracking-tight flex items-center gap-2">
                <i class="fa-solid fa-sliders text-indigo-500"></i>系统设置
            </h1>
            <p class="text-xs font-medium text-gray-500 dark:text-gray-400 mt-1">全局参数、API 密钥与自动化规则配置</p>
        </div>
        <button onclick="saveSettings()" id="top-save-btn" class="w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-bold text-sm shadow-sm transition-all active:scale-95">
            <i class="fa-solid fa-floppy-disk"></i>
            <span id="save-btn-text">保存配置</span>
        </button>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 2xl:grid-cols-3 gap-5 items-stretch">
        
        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-server text-indigo-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">Emby 核心连接</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">内网通信地址</label>
                    <input type="text" id="emby_host" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all placeholder-gray-400" placeholder="http://172.17.0.1:8096">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">系统 API Key</label>
                    <div class="relative">
                        <input type="password" id="emby_api_key" class="w-full pl-3 pr-10 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-indigo-500/50 outline-none transition-all">
                        <button type="button" onclick="toggleShow('emby_api_key')" class="absolute right-1 top-1/2 -translate-y-1/2 w-8 h-8 text-gray-400 hover:text-indigo-500 transition-colors">
                            <i id="icon-emby_api_key" class="fa-solid fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>

                <div class="pt-4 mt-2 border-t border-gray-100 dark:border-gray-700/50">
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide flex items-center gap-1">
                        统计数据获取模式 <i class="fa-solid fa-circle-info text-gray-400 cursor-help" title="若使用 Docker 挂载了 PlaybackReporting.db 请选本地直读（性能最好）；若未挂载，请选官方 API 穿透"></i>
                    </label>
                    <div class="grid grid-cols-2 gap-2">
                        <label class="relative flex items-center justify-center p-3 border rounded-xl cursor-pointer transition-all hover:bg-gray-50 dark:hover:bg-gray-700/50 has-[:checked]:border-indigo-500 has-[:checked]:bg-indigo-50/50 dark:has-[:checked]:bg-indigo-500/10 dark:border-gray-600">
                            <input type="radio" name="playback_data_mode" value="sqlite" class="peer sr-only">
                            <div class="text-center">
                                <i class="fa-solid fa-hard-drive block text-lg mb-1 text-gray-400 peer-checked:text-indigo-500"></i>
                                <span class="text-xs font-bold text-gray-700 dark:text-gray-300 mt-1 block">本地直读 (挂载)</span>
                            </div>
                            <i class="fa-solid fa-circle-check absolute top-2 right-2 text-indigo-500 opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                        </label>
                        <label class="relative flex items-center justify-center p-3 border rounded-xl cursor-pointer transition-all hover:bg-gray-50 dark:hover:bg-gray-700/50 has-[:checked]:border-emerald-500 has-[:checked]:bg-emerald-50/50 dark:has-[:checked]:bg-emerald-500/10 dark:border-gray-600">
                            <input type="radio" name="playback_data_mode" value="api" class="peer sr-only">
                            <div class="text-center">
                                <i class="fa-solid fa-cloud-arrow-down block text-lg mb-1 text-gray-400 peer-checked:text-emerald-500"></i>
                                <span class="text-xs font-bold text-gray-700 dark:text-gray-300 mt-1 block">官方 API 穿透</span>
                            </div>
                            <i class="fa-solid fa-circle-check absolute top-2 right-2 text-emerald-500 opacity-0 peer-checked:opacity-100 transition-opacity"></i>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-globe text-emerald-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">对外服务门户</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">公网访问入口</label>
                    <input type="text" id="emby_public_url" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-emerald-500/50 outline-none transition-all placeholder-gray-400" placeholder="https://emby.yourdomain.com">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">客户端引导链接 (可选)</label>
                    <input type="text" id="client_download_url" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-emerald-500/50 outline-none transition-all placeholder-gray-400" placeholder="https://emby.media/download.html">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">入职欢迎语 (可选)</label>

                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-bolt text-purple-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">MoviePilot 自动化流水线</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">通信地址</label>
                    <input type="text" id="moviepilot_url" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-purple-500/50 outline-none transition-all placeholder-gray-400" placeholder="http://192.168.31.2:3000">
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">API Token</label>
                    <div class="relative">
                        <input type="password" id="moviepilot_token" class="w-full pl-3 pr-10 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-purple-500/50 outline-none transition-all">
                        <button type="button" onclick="toggleShow('moviepilot_token')" class="absolute right-1 top-1/2 -translate-y-1/2 w-8 h-8 text-gray-400 hover:text-purple-500 transition-colors">

                        </button>
                    </div>
                </div>
                <div class="flex justify-end mt-2">
                    <button type="button" onclick="testMPConnection(this)" class="flex items-center justify-center gap-2 px-5 py-2.5 bg-blue-50 text-blue-600 hover:bg-blue-100 dark:bg-blue-900/30 dark:text-blue-400 dark:hover:bg-blue-900/50 border border-blue-200 dark:border-blue-800/50 rounded-xl text-sm font-bold shadow-sm transition-all active:scale-95">
                        <i class="fa-solid fa-plug"></i> 测试 MP 连通性
                    </button>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">Pulse 审批回跳地址</label>
                    <input type="text" id="pulse_url" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-purple-500/50 outline-none transition-all placeholder-gray-400" placeholder="请输入Emby Pulse公网地址">
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-network-wired text-blue-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">TMDB & 网络</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">TMDB API Key (v3)</label>
                    <div class="relative">
                        <input type="password" id="tmdb_api_key" class="w-full pl-3 pr-10 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all">
                        <button type="button" onclick="toggleShow('tmdb_api_key')" class="absolute right-1 top-1/2 -translate-y-1/2 w-8 h-8 text-gray-400 hover:text-blue-500 transition-colors">
                            <i id="icon-tmdb_api_key" class="fa-solid fa-eye text-sm"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">系统全局科学代理 (可选)</label>
                    <input type="text" id="proxy_url" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 focus:ring-2 focus:ring-blue-500/50 outline-none transition-all placeholder-gray-400" placeholder="http://127.0.0.1:7890">
                </div>
                <div class="pt-4 border-t border-gray-100 dark:border-gray-700/50">
                    <button onclick="runHealthCheck(this)" class="w-full flex items-center justify-center gap-2 px-5 py-2.5 bg-rose-50 text-rose-600 hover:bg-rose-100 dark:bg-rose-900/30 dark:text-rose-400 dark:hover:bg-rose-900/50 border border-rose-200 dark:border-rose-800/50 rounded-xl text-sm font-bold shadow-sm transition-all active:scale-95">
                        <i class="fa-solid fa-stethoscope"></i> 数据库深度体检
                    </button>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-shield-halved text-orange-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">Webhook 安全</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">验证 Token</label>
                    <input type="text" id="webhook_token" class="w-full px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-800 dark:text-gray-100 font-mono focus:ring-2 focus:ring-orange-500/50 outline-none transition-all">
                </div>
                <div class="bg-slate-50 dark:bg-gray-900/50 p-3 rounded-lg border border-slate-200 dark:border-gray-700 mt-2">
                    <p class="text-[10px] text-slate-500 font-bold mb-1 uppercase tracking-wider">填入 Emby 的完整 URL：</p>
                    <p class="text-xs font-mono text-orange-600 dark:text-orange-400 break-all select-all leading-relaxed" id="webhook-url-preview">...</p>
                </div>
            </div>
        </div>

        <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-200 dark:border-gray-700/80 flex flex-col">
            <div class="px-5 py-3.5 border-b border-gray-100 dark:border-gray-700/50 flex items-center gap-2.5 bg-gray-50/50 dark:bg-gray-800/30 rounded-t-xl">
                <i class="fa-solid fa-user-ninja text-gray-500 text-base"></i>
                <h3 class="font-bold text-gray-800 dark:text-gray-100 text-sm">隐藏黑名单</h3>
            </div>
            <div class="p-5 flex-1 flex flex-col space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-700 dark:text-gray-300 mb-1.5 uppercase tracking-wide">添加不参与排行的账号</label>
                    <div class="flex gap-2">
                        <select id="user-selector" class="flex-1 px-3 py-2 rounded-lg border border-gray-200 dark:border-gray-600 bg-gray-50 dark:bg-gray-900/50 text-sm text-gray-700 dark:text-gray-300 outline-none focus:ring-2 focus:ring-gray-400 transition-all cursor-pointer">
                            <option value="">选择用户...</option>
                        </select>
                        <button onclick="addHiddenUser()" class="px-4 py-2 bg-gray-800 dark:bg-gray-700 hover:bg-black dark:hover:bg-gray-600 text-white rounded-lg text-xs font-bold shadow-sm transition-all active:scale-95 shrink-0">添加</button>
                    </div>
                </div>
                <div id="hidden-users-container" class="flex flex-wrap gap-2 empty:hidden pt-1"></div>
            </div>
        </div>

    </div>
</div>

<div id="check-modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/60 backdrop-blur-sm px-4">
    <div class="bg-white dark:bg-gray-800 rounded-[2rem] shadow-2xl w-full max-w-lg overflow-hidden border border-gray-100 dark:border-gray-700 transform transition-all scale-95 opacity-0 duration-300" id="modal-container">
        <div class="p-6">
            <div class="flex items-center justify-between mb-6">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-indigo-50 dark:bg-indigo-900/30 rounded-xl flex items-center justify-center text-indigo-500 border border-indigo-100 dark:border-indigo-800/50">
                        <i class="fa-solid fa-stethoscope text-lg"></i>
                    </div>
                    <div>
                        <h3 class="text-base font-black text-gray-900 dark:text-white">全库体检与自愈报告</h3>
                        <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest">Health Check & Auto Fix</p>
                    </div>
                </div>
                <button onclick="closeCheckModal()" class="text-gray-400 hover:text-red-500 transition w-8 h-8 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 flex items-center justify-center">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </button>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3" id="check-items-list"></div>

            <div id="fix-section" class="hidden mt-6 pt-6 border-t border-gray-50 dark:border-gray-700/50 animate-fade-in">
                <div class="bg-orange-50 dark:bg-orange-900/10 p-4 rounded-xl mb-4 flex items-start gap-3 border border-orange-100 dark:border-orange-900/30">
                    <i class="fa-solid fa-screwdriver-wrench text-orange-500 mt-0.5"></i>
                    <p class="text-[11px] text-orange-700 dark:text-orange-400 font-bold leading-relaxed">检测到部分关键数据表或字段缺失。<br>系统已自动为您原地重建并修复完毕，历史数据未受影响。</p>
                </div>
                <button onclick="closeCheckModal()" class="w-full py-3 bg-gray-800 hover:bg-black dark:bg-gray-700 dark:hover:bg-gray-600 text-white rounded-xl font-black text-sm shadow-md transition active:scale-[0.98]">
                    我知道了
                </button>
            </div>

            <div id="healthy-section" class="hidden mt-6 text-center py-4 animate-fade-in">
                <div class="w-14 h-14 bg-emerald-50 dark:bg-emerald-900/20 text-emerald-500 rounded-full flex items-center justify-center mx-auto mb-3 border border-emerald-100 dark:border-emerald-800">
                    <i class="fa-solid fa-check text-2xl"></i>
                </div>
                <p class="text-sm font-black text-emerald-600 dark:text-emerald-400">8 大核心数据表结构完整，极度健康！</p>
            </div>
        </div>
    </div>
</div>

<div id="settings-toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-2xl border backdrop-blur-xl flex items-center gap-2 font-bold transition-all duration-300 transform -translate-y-20 opacity-0 pointer-events-none text-sm">
    <span id="settings-toast-msg"></span>
</div>

<script>
let allUsers = [];
let hiddenUsers = [];

document.addEventListener('DOMContentLoaded', async () => {
    const uRes = await fetch('/api/users');
    const uJson = await uRes.json();
    if(uJson.status === 'success') {
        allUsers = uJson.data;
        const sel = document.getElementById('user-selector');
        allUsers.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.UserId;
            opt.textContent = u.UserName;
            sel.appendChild(opt);
        });
    }
    loadSettings();
});

async function loadSettings() {
    const res = await fetch('/api/settings');
    const json = await res.json();
    if (json.status === 'success') {
        const d = json.data;
        document.getElementById('emby_host').value = d.emby_host || '';
        document.getElementById('emby_api_key').value = d.emby_api_key || '';
        document.getElementById('tmdb_api_key').value = d.tmdb_api_key || '';
        document.getElementById('proxy_url').value = d.proxy_url || '';
        document.getElementById('webhook_token').value = d.webhook_token || '';
        document.getElementById('emby_public_url').value = d.emby_public_url || '';
        document.getElementById('welcome_message').value = d.welcome_message || '';
        document.getElementById('client_download_url').value = d.client_download_url || '';
        document.getElementById('moviepilot_url').value = d.moviepilot_url || '';
        document.getElementById('moviepilot_token').value = d.moviepilot_token || '';
        document.getElementById('pulse_url').value = d.pulse_url || '';

        // 🔥 注入点：双擎模式开关回显
        const mode = d.playback_data_mode || 'sqlite';
        const radio = document.querySelector(`input[name="playback_data_mode"][value="${mode}"]`);
        if (radio) radio.checked = true;

        hiddenUsers = d.hidden_users || [];
        renderHiddenUsers();
        updateWebhookPreview();
    }
}

function renderHiddenUsers() {
    const container = document.getElementById('hidden-users-container');
    container.innerHTML = '';
    hiddenUsers.forEach(uid => {
        const user = allUsers.find(u => u.UserId === uid);
        const name = user ? user.UserName : uid;
        
        const tag = document.createElement('div');
        tag.className = 'flex items-center gap-1.5 px-2.5 py-1 bg-gray-100 dark:bg-gray-700 rounded-md text-xs font-bold text-gray-700 dark:text-gray-300 border border-gray-200 dark:border-gray-600';
        tag.innerHTML = `
            <span>${name}</span>
            <button onclick="removeHiddenUser('${uid}')" class="text-gray-400 hover:text-red-500 focus:outline-none">
                <i class="fa-solid fa-xmark"></i>
            </button>
        `;
        container.appendChild(tag);
    });
}

function addHiddenUser() {
    const sel = document.getElementById('user-selector');
    const uid = sel.value;
    if (uid && !hiddenUsers.includes(uid)) {
        hiddenUsers.push(uid);
        renderHiddenUsers();
    }
    sel.value = '';
}

function removeHiddenUser(uid) {
    hiddenUsers = hiddenUsers.filter(id => id !== uid);
    renderHiddenUsers();
}

function updateWebhookPreview() {
    const token = document.getElementById('webhook_token').value;
    const host = window.location.origin;
    document.getElementById('webhook-url-preview').textContent = `${host}/api/v1/webhook?token=${token}`;
}

document.getElementById('webhook_token').addEventListener('input', updateWebhookPreview);

function showToast(msg, type = 'success') {
    const toast = document.getElementById('settings-toast');
    const toastMsg = document.getElementById('settings-toast-msg');
    toastMsg.textContent = msg;
    
    toast.className = toast.className.replace(/bg-white.*?border-\w+-300 text-\w+-600/g, '');
    
    if (type === 'success') {
        toast.classList.add('bg-white/90', 'dark:bg-zinc-800/90', 'border-green-300', 'text-green-600', 'dark:border-green-500/30', 'dark:text-green-400');
    } else {
        toast.classList.add('bg-white/90', 'dark:bg-zinc-800/90', 'border-red-300', 'text-red-600', 'dark:border-red-500/30', 'dark:text-red-400');
    }
    
    toast.classList.remove('-translate-y-20', 'opacity-0');
    toast.classList.add('translate-y-0', 'opacity-100');
    setTimeout(() => {
        toast.classList.remove('translate-y-0', 'opacity-100');
        toast.classList.add('-translate-y-20', 'opacity-0');
    }, 3000);
}

async function saveSettings() {
    const data = {
        emby_host: document.getElementById('emby_host').value,
        emby_api_key: document.getElementById('emby_api_key').value,
        tmdb_api_key: document.getElementById('tmdb_api_key').value,
        proxy_url: document.getElementById('proxy_url').value,
        webhook_token: document.getElementById('webhook_token').value,
        hidden_users: hiddenUsers,
        emby_public_url: document.getElementById('emby_public_url').value,
        welcome_message: document.getElementById('welcome_message').value,

        moviepilot_token: document.getElementById('moviepilot_token').value,
        pulse_url: document.getElementById('pulse_url').value,
        // 🔥 注入点：获取当前选中的双擎模式
        playback_data_mode: document.querySelector('input[name="playback_data_mode"]:checked')?.value || 'sqlite'
    };

    const btnBtn = document.getElementById('top-save-btn');

    const icon = btnBtn.querySelector('i');
    
    icon.className = "fa-solid fa-spinner fa-spin";
    textSpan.textContent = "保存中...";
    btnBtn.disabled = true;
    
    try {
        const res = await fetch('/api/settings', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const json = await res.json();
        
        icon.className = "fa-solid fa-check";
        textSpan.textContent = "保存成功";
        btnBtn.classList.replace('bg-indigo-600', 'bg-emerald-500');
        btnBtn.classList.replace('hover:bg-indigo-700', 'hover:bg-emerald-600');
        showToast('设置保存成功', 'success');
        
        setTimeout(() => {
            icon.className = "fa-solid fa-floppy-disk";
            textSpan.textContent = "保存配置";
            btnBtn.classList.replace('bg-emerald-500', 'bg-indigo-600');
            btnBtn.classList.replace('hover:bg-emerald-600', 'hover:bg-indigo-700');

        }, 1500);
        
    } catch(e) {
        showToast("网络请求失败", 'error');
        icon.className = "fa-solid fa-floppy-disk";
        textSpan.textContent = "保存配置";
        btnBtn.disabled = false;
    }
}

function toggleShow(id) {
    const input = document.getElementById(id);
    const icon = document.getElementById('icon-' + id);
    if(input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
    } else {
        input.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
    }
}

async function runHealthCheck(btn) {
    const originalHtml = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> 全面体检中...';
    btn.disabled = true;

    try {
        openCheckModal();
        const listContainer = document.getElementById('check-items-list');
        const fixSection = document.getElementById('fix-section');
        const healthySection = document.getElementById('healthy-section');
        
        // 映射后端的 8 大核心组件
        const items = [
            { id: 'playback', name: '播放活动引擎', keys: ['播放活动'] },
            { id: 'users', name: '用户数据中心', keys: ['用户元数据'] },
            { id: 'invites', name: '邀请码与权限', keys: ['邀请码'] },
            { id: 'calendar', name: '追剧日历缓存', keys: ['追剧日历'] },
            { id: 'requests', name: '求片心愿系统', keys: ['求片'] },
            { id: 'ignores', name: '洗版隔离组件', keys: ['盘点忽略'] },
            { id: 'gaps', name: '缺集扫描组件', keys: ['缺集记录'] }
        ];
        
        // 渲染骨架屏 (Spinners)
        listContainer.innerHTML = items.map(item => `
            <div class="flex items-center justify-between p-3 bg-gray-50 dark:bg-gray-900/50 rounded-xl border border-gray-100 dark:border-gray-700/50">
                <span class="text-xs font-bold text-gray-700 dark:text-gray-300 flex items-center gap-2"><i class="fa-solid fa-database text-gray-400"></i> ${item.name}</span>
                <i class="fa-solid fa-circle-notch fa-spin text-indigo-500" id="check-icon-${item.id}"></i>
            </div>
        `).join('');

        // 触发展开全库体检与自动修复接口
        const checkRes = await fetch('/api/settings/fix_db', { method: 'POST' });
        const checkJson = await checkRes.json();
        const msg = checkJson.message || "";
        
        let anyFixed = false;

        // 假装扫描的延迟动画效果 (让用户感觉在深度扫描)
        setTimeout(() => {
            items.forEach(item => {
                // 如果后端的反馈信息里包含了这个组件的关键词，说明它被修复了
                const wasFixed = item.keys.some(k => msg.includes(k));
                if (wasFixed) anyFixed = true;
                
                document.getElementById(`check-icon-${item.id}`).outerHTML = wasFixed 
                    ? '<span class="text-[10px] bg-orange-100 dark:bg-orange-500/20 text-orange-600 dark:text-orange-400 px-2 py-0.5 rounded-md font-black border border-orange-200 dark:border-orange-500/30 shadow-sm">已自动修复</span>'
                    : '<i class="fa-solid fa-circle-check text-emerald-500 text-lg"></i>';
            });

            // 根据是否发生了修复，显示不同的结果版块
            if (anyFixed) {
                fixSection.classList.remove('hidden');
                healthySection.classList.add('hidden');
            } else {
                fixSection.classList.add('hidden');
                healthySection.classList.remove('hidden');
            }
        }, 800);

    } catch (e) {
        showToast('体检异常', 'error');
    } finally {
        btn.innerHTML = originalHtml;
        btn.disabled = false;
    }
}

async function executeDatabaseFix(btn) {
    const originalText = btn.innerHTML;
    btn.innerHTML = '<i class="fa-solid fa-spinner animate-spin"></i> 正在修复结构...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/settings/fix_db', { method: 'POST' });
        const data = await res.json();
        showToast(data.message, 'success');
        setTimeout(() => { closeCheckModal(); }, 1000);
    } catch (e) {
        showToast('修复失败', 'error');
    }
}

function openCheckModal() {
    const m = document.getElementById('check-modal');
    const c = document.getElementById('modal-container');
    m.classList.remove('hidden'); m.classList.add('flex');
    setTimeout(() => { c.classList.remove('scale-95', 'opacity-0'); c.classList.add('scale-100', 'opacity-100'); }, 10);
}

function closeCheckModal() {
    const m = document.getElementById('check-modal');
    const c = document.getElementById('modal-container');
    c.classList.add('scale-95', 'opacity-0'); c.classList.remove('scale-100', 'opacity-100');
    setTimeout(() => { m.classList.add('hidden'); m.classList.remove('flex'); }, 300);
}
