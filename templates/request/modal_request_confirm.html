<div x-show="isModalOpen" class="fixed inset-0 z-50 flex items-end md:items-center justify-center p-0 md:p-4" x-cloak>
    <div x-show="isModalOpen" x-transition.opacity @click="closeModal()" class="absolute inset-0 bg-slate-900/60 dark:bg-black/90 backdrop-blur-sm"></div>
    
    <div x-show="isModalOpen" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-full md:translate-y-10 scale-95" x-transition:enter-end="opacity-100 translate-y-0 scale-100" class="relative w-full md:w-[600px] max-h-[90vh] bg-white dark:bg-[#0a0a0a] border border-slate-200 dark:border-white/5 rounded-t-3xl md:rounded-3xl overflow-hidden shadow-2xl flex flex-col">
        
        <div class="relative h-48 md:h-64 shrink-0 bg-slate-200 dark:bg-[#111]">
            <img :src="activeItem?.backdrop_path || activeItem?.poster_path" class="w-full h-full object-cover opacity-80 dark:opacity-40 transition-opacity duration-500">
            <div class="absolute inset-0 bg-gradient-to-t from-white via-white/40 dark:from-[#0a0a0a] dark:via-[#0a0a0a]/40 to-transparent"></div>
            <button @click="closeModal()" class="absolute top-4 right-4 bg-black/30 hover:bg-black/50 text-white rounded-full p-2 backdrop-blur-md transition shadow-sm z-20">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>

        <div class="relative px-6 pb-6 pt-0 flex-1 overflow-y-auto hide-scrollbar -mt-16">
            <div class="flex gap-4 items-end mb-4">
                <img :src="activeItem?.poster_path" class="w-24 md:w-32 rounded-xl shadow-xl ring-4 ring-white dark:ring-[#0a0a0a] relative z-10 aspect-[2/3] object-cover bg-slate-200 dark:bg-[#111]">
                <div class="pb-2 flex-1 min-w-0">
                    <h2 class="text-2xl md:text-3xl font-extrabold leading-tight text-slate-900 dark:text-white drop-shadow-sm truncate" x-text="activeItem?.title"></h2>
                    <div class="flex items-center gap-3 mt-2 text-sm font-bold text-slate-600 dark:text-zinc-300">
                        <span class="px-2 py-0.5 bg-brand-50 text-brand-600 dark:bg-white/10 dark:text-brand-400 rounded" x-text="activeItem?.media_type === 'movie' ? '电影' : '剧集'"></span>
                        <span x-text="activeItem?.year"></span>
                        <span class="flex items-center gap-1 text-yellow-500 font-black"><i class="fa-solid fa-star"></i> <span x-text="activeItem?.vote_average"></span></span>
                    </div>
                </div>
            </div>
            
            <p class="text-slate-600 dark:text-zinc-400 text-sm leading-relaxed mb-6 font-medium" x-text="activeItem?.overview || '暂无详细剧情简介...'"></p>

            <div x-show="activeItem?.media_type === 'tv'" class="mb-6 bg-slate-50 dark:bg-white/5 rounded-2xl p-4 border border-slate-200 dark:border-white/5 shadow-inner">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="text-sm font-black text-slate-800 dark:text-white flex items-center gap-2">
                        <i class="fa-solid fa-layer-group text-brand-500"></i>
                        订阅分季 <span class="text-[10px] font-bold text-slate-400 opacity-60">(可多选)</span>
                        <span x-show="isLoadingSeasons" class="text-[10px] text-brand-500 animate-pulse font-bold">正在穿透库...</span>
                    </h4>
                    <button x-show="!isLoadingSeasons && tvSeasons.length > 0" @click="toggleSelectAllSeasons()" class="text-xs font-black text-brand-600 dark:text-brand-400 hover:underline px-2 py-1 rounded-lg hover:bg-brand-50 dark:hover:bg-brand-500/10 transition-colors">全选/全消</button>
                </div>
                
                <div class="flex flex-col gap-2 max-h-56 overflow-y-auto hide-scrollbar pr-1">
                    <template x-for="s in tvSeasons" :key="s.season_number">
                        <label class="flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-bold transition-all border cursor-pointer select-none group"
                               :class="s.exists_locally ? 'bg-green-50/50 border-green-200 text-green-700 dark:bg-green-500/5 dark:border-green-500/10 dark:text-green-500 opacity-60 cursor-not-allowed' : (selectedSeasons.includes(s.season_number) ? 'bg-brand-500 border-brand-400 text-white shadow-md shadow-brand-500/20' : 'bg-white border-slate-200 text-slate-700 hover:border-brand-300 dark:bg-white/5 dark:border-white/5 dark:text-zinc-300 dark:hover:bg-white/10')">
                            
                            <input type="checkbox" :value="s.season_number" x-model="selectedSeasons" :disabled="s.exists_locally" class="w-4 h-4 rounded text-brand-600 focus:ring-brand-500 dark:bg-black dark:border-white/20" :class="s.exists_locally ? 'hidden' : ''">
                            
                            <div class="flex-1">
                                <div class="flex items-center gap-2">
                                    <span x-text="`第 ${s.season_number} 季`"></span>
                                    
                                    <span x-show="s.exists_locally" class="text-[9px] bg-green-200 dark:bg-green-500/20 text-green-800 dark:text-green-400 px-1.5 py-0.5 rounded font-black">
                                        已入库 ( <span x-text="s.local_ep_count || 0"></span> / <span x-text="s.episode_count"></span> 集 )
                                    </span>
                                </div>
                                <div class="text-[10px] opacity-60 mt-0.5" x-text="`共 ${s.episode_count} 集内容`"></div>
                            </div>
                            
                            <i class="fa-solid fa-check-circle transition-transform" :class="selectedSeasons.includes(s.season_number) ? 'scale-110' : 'scale-0'"></i>
                        </label>
                    </template>
                    
                    <div x-show="!isLoadingSeasons && tvSeasons.length === 0" class="text-center py-4 text-slate-400 text-xs font-bold">未检索到该剧集的分季数据</div>
                </div>
            </div>

            <div class="flex gap-3 mt-4 mb-[env(safe-area-inset-bottom)]" x-data="requestPointsCheck()" x-init="initCheck()">
                
                <button @click="submitRequest()" :disabled="isSubmitting || isCheckingLocal || (activeItem?.media_type === 'tv' && selectedSeasons.length === 0) || (activeItem?.media_type === 'movie' && activeItem?.local_status === 2)" 
                        class="flex-1 py-4 rounded-2xl font-black text-lg flex justify-center items-center gap-3 transition-all disabled:opacity-50 disabled:cursor-not-allowed text-white shadow-xl" 
                        :class="(activeItem?.local_status === 2 && activeItem?.media_type !== 'tv') ? 'bg-green-600 shadow-green-600/30 cursor-default' : 'bg-slate-900 hover:bg-slate-800 dark:bg-brand-600 dark:hover:bg-brand-500 dark:shadow-brand-600/30 active:scale-95'">
                    
                    <span x-show="isSubmitting || isCheckingLocal" class="animate-spin w-5 h-5 border-2 border-white/30 border-t-white rounded-full"></span>
                    
                    <template x-if="!isSubmitting && !isCheckingLocal">
                        <div class="flex items-center gap-2">
                            <i class="fa-solid" :class="(activeItem?.local_status === 2 && activeItem?.media_type !== 'tv') ? 'fa-check-double' : 'fa-paper-plane'"></i>
                            <span>
                                <span x-text="(activeItem?.local_status === 2 && activeItem?.media_type !== 'tv') ? '该电影已在库中' : '发送许愿心愿'"></span>
                                <span x-show="enableCost && !(activeItem?.local_status === 2 && activeItem?.media_type !== 'tv')" class="text-[11px] bg-black/20 px-1.5 py-0.5 rounded-lg ml-1.5 font-mono tracking-tighter inline-flex items-center gap-1 shadow-inner border border-white/10">
                                    <i class="fa-solid fa-coins text-amber-400"></i> -<span x-text="reqCost"></span>
                                </span>
                            </span>
                        </div>
                    </template>
                </button>

                <button x-show="(!isCheckingLocal && !isLoadingSeasons) && (activeItem?.local_status === 2 || (activeItem?.media_type === 'tv' && tvSeasons.some(s => s.exists_locally)))" @click="openFeedbackModal(activeItem.title, activeItem.poster_path)" class="px-6 py-4 rounded-2xl bg-rose-50 text-rose-500 hover:bg-rose-500 hover:text-white dark:bg-rose-500/10 dark:text-rose-400 dark:hover:bg-rose-500 dark:hover:text-white border border-rose-100 dark:border-rose-500/20 font-black transition-all shadow-md flex items-center justify-center active:scale-95" title="资源有问题？点此向服主反馈">
                    <i class="fa-solid fa-triangle-exclamation text-xl"></i>
                </button>
            </div>

        </div>
    </div>
</div>

<script>
    document.addEventListener('alpine:init', () => {
        Alpine.data('requestPointsCheck', () => ({
            reqCost: 0,
            enableCost: false,
            initCheck() {
                fetch('/api/user/points/info').then(r=>r.json()).then(res => {
                    if(res.status === 'success') {
                        this.enableCost = res.data.config.enable_req_cost === '1';
                        this.reqCost = res.data.config.req_cost || 50;
                    }
                }).catch(e => console.log(e));
            }
        }));
    });
</script>
